<!DOCTYPE html>

<head>

  <title>旅游攻略分享站</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #e8f4fd 0%, #f0f7f0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; }

    .trip-link:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(24,95,165,0.3); }
    .trip-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .trip-meta { font-size: 13px; opacity: 0.85; }
    .badge { display: inline-block; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 12px; font-size: 12px; margin-top: 8px; }
    .links { margin-top: 24px; display: flex; gap: 12px; justify-content: center; }
    .links a { color: #185fa5; text-decoration: none; font-size: 14px; padding: 8px 16px; border: 1px solid #185fa5; border-radius: 8px; transition: all 0.2s; }
    .links a:hover { background: #185fa5; color: #fff; }
    .footer { margin-top: 32px; font-size: 12px; color: #aaa; }
  </style>
</head>
